version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hestia-postgres-dev
    environment:
      POSTGRES_DB: hestia_dev
      POSTGRES_USER: hestia_dev
      POSTGRES_PASSWORD: hestia_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hestia_dev -d hestia_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hestia-network

volumes:
  postgres_data:
    driver: local

networks:
  hestia-network:
    driver: bridge
